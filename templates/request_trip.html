{% extends "base.html" %}

{% block title %}
Request Trip
{% endblock %}

{% block content %}

<div class="card p-4 mx-auto" style="max-width:700px;">

    <h2 class="mb-4 text-center">
        <i class="fa-solid fa-route text-info"></i>
        Request New Trip
    </h2>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Passenger</label>

            <select
                name="passenger_id"
                class="form-select"
                required>

                {% for passenger in passengers %}

                <option value="{{ passenger.id }}">
                    {{ passenger.user.fullname }}
                </option>

                {% endfor %}

            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">
                <i class="fa-solid fa-location-dot text-success"></i>
                Start Latitude
            </label>

            <input
                type="number"
                step="0.000001"
                name="start_lat"
                class="form-control"
                placeholder="35.6892"
                required>
        </div>

        <div class="mb-4">
            <label class="form-label">
                <i class="fa-solid fa-location-dot text-danger"></i>
                Start Longitude
            </label>

            <input
                type="number"
                step="0.000001"
                name="start_lon"
                class="form-control"
                placeholder="51.3890"
                required>
        </div>

        <div class="text-center">

            <button
                type="submit"
                class="btn btn-success px-5">

                <i class="fa-solid fa-taxi"></i>
                Request Trip

            </button>

        </div>

    </form>

</div>

{% endblock %}
