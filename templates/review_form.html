{% extends "base.html" %}

{% block title %}
Add Review
{% endblock %}

{% block content %}

<h2>Add New Review</h2>
<form method="POST">

    <div class="mb-3">
        <label>User</label>

        <select name="user_id" class="form-control">

            {% for user in users %}

            <option value="{{ user.id }}">
                {{ user.fullname }} ({{ user.phone }})
            </option>

            {% endfor %}

        </select>

    </div>
    <div class="mb-3">
        <label>Trip</label>

        <select name="trip_id" class="form-control">

            {% for trip in trips %}

            <option value="{{ trip.id }}">
                {{ trip.id}} ({{ trip.driver.user.fullname}}) ({{ trip.passenger.user.fullname}})
            </option>

            {% endfor %}

        </select>

    </div>

    <div class="mb-3">
        <label>Rating</label>
        <input type="number"
               step="1"
               name="rating"
               value="{{ review.rating if review else '' }}"
               class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">Comment</label>
        <input
            type="text"
            name="comment"
            class="form-control"
            required>
    </div>
    <button class="btn btn-primary">
        Save Review
    </button>
</form>
{% endblock %}
