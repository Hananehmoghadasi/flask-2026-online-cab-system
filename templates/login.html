{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="card p-4 mx-auto form-card">

    <h2 class="text-center mb-4">
        <i class="fa-solid fa-right-to-bracket text-info"></i>
        Login
    </h2>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Phone Number
            </label>

            <input
                type="text"
                name="phone"
                class="form-control"
                placeholder="Enter your phone number"
                required>

        </div>

        <div class="mb-4">

            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter your password"
                required>

        </div>

        <div class="d-grid">

            <button type="submit" class="btn btn-primary">

                <i class="fa-solid fa-right-to-bracket"></i>

                Login

            </button>

        </div>

    </form>

    <hr>

    <p class="text-center mb-0">

        Don't have an account?

        <a href="{{ url_for('signup') }}" class="text-info text-decoration-none">

            Sign Up

        </a>

    </p>

</div>

{% endblock %}
