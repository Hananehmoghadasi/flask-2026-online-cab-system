{% extends "base.html" %}

{% block title %}
Add Driver
{% endblock %}

{% block content %}

<div class="card p-4 mx-auto" style="max-width:700px;">

    <h2 class="mb-4 text-center">
        <i class="fa-solid fa-car-side text-info"></i>
        Add New Driver
    </h2>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">User</label>

            <select name="user_id" class="form-select">

                {% for user in users %}

                <option value="{{ user.id }}">
                    {{ user.fullname }} ({{ user.phone }})
                </option>

                {% endfor %}

            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Rating</label>

            <input
                type="number"
                step="0.1"
                name="rating"
                class="form-control"
                placeholder="Driver Rating"
                value="{{ driver.rating if driver else '' }}">
        </div>

        <div class="mb-4">
            <label class="form-label">Status</label>

            <select name="status" class="form-select">

                <option value="active"
                    {% if driver and driver.status=='active' %}selected{% endif %}>
                    Active
                </option>

                <option value="busy"
                    {% if driver and driver.status=='busy' %}selected{% endif %}>
                    Busy
                </option>

                <option value="inactive"
                    {% if driver and driver.status=='inactive' %}selected{% endif %}>
                    Inactive
                </option>

            </select>
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-primary px-5">
                <i class="fa-solid fa-floppy-disk"></i>
                Save Driver
            </button>
        </div>

    </form>

</div>

{% endblock %}
