{% extends "base.html" %}

{% block title %}
Add Vehicle
{% endblock %}

{% block content %}

<h2>Add New Vehicle</h2>
<form method="POST">

    <div class="mb-3">
        <label>Driver</label>

        <select name="driver_id" class="form-control">

            {% for driver in drivers %}

            <option value="{{ driver.id }}">
                {{ driver.user.fullname }}
            </option>

            {% endfor %}

        </select>

    </div>

    <div class="mb-3">
        <label>Model</label>
        <input type="text"
               name="model"
               class="form-control"
               required>
    </div>
    <div class="mb-3">
        <label class="form-label">Color</label>
        <input
            type="text"
            name="color"
            class="form-control"
            required>
    </div>
    <div class="mb-3">
        <label class="form-label">Plate</label>
        <input
            type="text"
            name="plate"
            value="{{ vehicle.plate if vehicle else '' }}"
            class="form-control"
            required>
    </div>
    <button class="btn btn-primary">
        Save Vehicle
    </button>
</form>
{% endblock %}
