{% extends "base.html" %}

{% block title %}
Complete Trip
{% endblock %}

{% block content %}

<div class="card p-4 mx-auto form-card">

    <h2 class="text-center mb-4">
        <i class="fa-solid fa-circle-check text-success"></i>
        Complete Trip #{{ trip.id }}
    </h2>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                <i class="fa-solid fa-location-dot text-success"></i>
                End Latitude
            </label>

            <input
                type="number"
                step="0.000001"
                name="end_lat"
                class="form-control"
                placeholder="35.6892"
                required>

        </div>

        <div class="mb-4">

            <label class="form-label">
                <i class="fa-solid fa-location-dot text-danger"></i>
                End Longitude
            </label>

            <input
                type="number"
                step="0.000001"
                name="end_lon"
                class="form-control"
                placeholder="51.3890"
                required>

        </div>

        <div class="d-grid gap-2">

            <button
                type="submit"
                class="btn btn-success">

                <i class="fa-solid fa-check"></i>

                Complete Trip

            </button>

            <a href="{{ url_for('trips') }}"
               class="btn btn-outline-light">

                <i class="fa-solid fa-arrow-left"></i>

                Back

            </a>

        </div>

    </form>

</div>

{% endblock %}
