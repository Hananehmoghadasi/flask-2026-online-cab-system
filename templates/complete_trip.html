{% extends "base.html" %}

{% block content %}

<h2>Complete Trip #{{ trip.id }}</h2>

<form method="POST">

    <div class="mb-3">

        <label class="form-label">
            End Latitude
        </label>

        <input
            type="number"
            step="0.000001"
            name="end_lat"
            class="form-control"
            required>

    </div>

    <div class="mb-3">

        <label class="form-label">
            End Longitude
        </label>

        <input
            type="number"
            step="0.000001"
            name="end_lon"
            class="form-control"
            required>

    </div>

    <button
        class="btn btn-primary">

        Complete Trip

    </button>

</form>

{% endblock %}
